<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Car Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container" id="game-container">
        <!-- The Target Circle (Win/Lose indicator) -->
        <div class="target-circle" id="target-circle"></div>

        <!-- The Car -->
        <div class="car" id="car">🚔</div>

        <!-- The Colored Squares -->
        <div class="square black" id="sq-black">⬛️</div>
        <div class="square red" id="sq-red">🟥</div>
        <div class="square yellow" id="sq-yellow">🟨</div>

        <!-- The Direction Buttons -->
        <button class="btn up" id="btn-up">⬆️</button>
        <button class="btn down" id="btn-down">⬇️</button>
        <button class="btn left" id="btn-left">⬅️</button>
        <button class="btn right" id="btn-right">➡️</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
